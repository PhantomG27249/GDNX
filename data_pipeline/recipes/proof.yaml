# Proof recipe — validates the pipeline end-to-end at small scale before the
# serious build. Uses only sources that run without the starcoderdata gate
# (code lane = the_stack_smol stand-in). Swap in `starcoderdata` once accepted.
#
# Bands reflect the training plan: bulk at 32k, top-off at 65k, plus a short
# don't-regress band. Budgets are full-size; use `--scale` for a quick smoke.
model: Qwen/Qwen3.5-0.8B

bands:
  short:                       # don't-regress backbone (short-mid)
    seq_len: 4096
    tokens: 40000000
    sources:
      - {source: fineweb_edu,       weight: 0.35}
      - {source: finemath,          weight: 0.20}
      - {source: synth_multiquery,  weight: 0.20, config: {target_chars: 4000}}
      - {source: starcoderdata,     weight: 0.15, config: {langs: [python], repo_chars: 24000}}
      - {source: musique,           weight: 0.10}

  main:                        # BULK of training — 32k long-range
    seq_len: 32768
    tokens: 40000000
    sources:
      - {source: pg19,              weight: 0.22}
      - {source: nemotron_agentic,  weight: 0.20}
      - {source: starcoderdata,     weight: 0.18, config: {langs: [python], repo_chars: 200000}}
      - {source: synth_needle,      weight: 0.12, config: {target_chars: 120000, n_needles: 24}}
      - {source: synth_copy,        weight: 0.12, config: {target_chars: 120000}}
      - {source: synth_multiquery,  weight: 0.10, config: {target_chars: 120000, max_bindings: 120}}
      - {source: hotpotqa,          weight: 0.06}

  top:                         # top-off — 65k+ extreme range
    seq_len: 65536
    tokens: 20000000
    sources:
      - {source: pg19,              weight: 0.40}
      - {source: synth_needle,      weight: 0.30, config: {target_chars: 260000, n_needles: 48}}
      - {source: synth_copy,        weight: 0.30, config: {target_chars: 260000}}
